<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hover Bover</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0d1b2a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: monospace;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
      }
      #game {
        display: block;
        image-rendering: pixelated;
        touch-action: none;
        /* Scale the fixed 480x392 canvas up to the largest size that fits the
           window, keeping its aspect ratio and crisp pixels. The canvas's
           intrinsic ratio is preserved by setting only the width
           (480/392 ≈ 1.2245, so 96vh of height ≈ 117.6vh of width). */
        /* !important to beat the inline width/height Kaplay sets on the canvas. */
        width: min(96vw, 117.6vh) !important;
        height: auto !important;
      }
      #mobile-controls {
        display: none;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: clamp(118px, 24vh, 168px);
        padding: 12px max(18px, env(safe-area-inset-left)) max(14px, env(safe-area-inset-bottom));
        box-sizing: border-box;
        pointer-events: none;
        z-index: 10;
      }
      .mobile-stick,
      .mobile-action {
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-stick {
        position: absolute;
        left: max(18px, env(safe-area-inset-left));
        bottom: max(14px, env(safe-area-inset-bottom));
        width: clamp(92px, 26vw, 128px);
        aspect-ratio: 1;
      }
      .mobile-stick-ring {
        position: absolute;
        inset: 0;
        border: 3px solid rgba(244, 244, 244, 0.7);
        border-radius: 50%;
        background:
          linear-gradient(rgba(255, 210, 63, 0.14), rgba(72, 202, 228, 0.08)),
          rgba(8, 14, 24, 0.72);
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35);
      }
      .mobile-stick-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 42%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #ffd23f;
        border: 3px solid #1b1b29;
        box-shadow: inset -5px -5px 0 rgba(0, 0, 0, 0.22);
        transform: translate(-50%, -50%);
      }
      .mobile-action {
        position: absolute;
        right: max(20px, env(safe-area-inset-right));
        bottom: max(20px, env(safe-area-inset-bottom));
        width: clamp(76px, 21vw, 104px);
        aspect-ratio: 1;
        border-radius: 50%;
        border: 4px solid #1b1b29;
        background: #e63946;
        color: #f4f4f4;
        box-shadow: 0 7px 0 rgba(0, 0, 0, 0.4);
        font: 700 clamp(15px, 4vw, 20px) monospace;
        letter-spacing: 0;
      }
      .mobile-action.is-pressed {
        transform: translateY(4px);
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
      }
      @media (max-width: 820px), (hover: none), (pointer: coarse) {
        body {
          /* Reserve the bottom band for the touch controls, then center the
             canvas vertically in whatever space is left above it. */
          align-items: center;
          justify-content: center;
          padding: max(6px, env(safe-area-inset-top)) 0
            clamp(118px, 24vh, 168px);
          box-sizing: border-box;
        }
        #game {
          width: auto !important;
          height: min(calc(100vh - 150px), 82vw, 392px) !important;
          max-width: 98vw;
        }
        #mobile-controls {
          display: block;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CvcK3UZY.js"></script>
  </head>
  <body>
    <canvas id="game"></canvas>
  </body>
</html>
